name: Generate Star History Chart

on:
  schedule:
    - cron: '0 0 * * *' # Runs automatically every day at midnight
  workflow_dispatch: # Allows you to run it manually right now

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Generate Star History
        uses: seladb/star-history-action@v2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }} # Uses internal GitHub auth safely

      - name: Commit and Push Chart
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add star-history.png || true
          git commit -m "Update star history chart" || true
          git push